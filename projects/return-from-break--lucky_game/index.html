<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <h1>Lucky Number Game</h1>

        <label for="nameInput">Name:</label>
        <input type="text" id="nameInput" placeholder="Enter your name">

        <label for="guessNumber">Guess a number (1–10):</label>
        <input type="number" id="guessNumber" min="1" max="10">

        <div class="checkbox">
            <input type="checkbox" id="iAgree">
            <label for="iAgree">I agree to play</label>
        </div>

        <button id="playBtn">Play Game</button>

        <pre id="result"></pre>

    </div>

    <script src="script.js"></script>
</body>
</html>
