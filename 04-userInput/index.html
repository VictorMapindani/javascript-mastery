<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lesson 4 - User Input</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 
    This is the main heading.
    We will dynamically change this text using JavaScript.
  -->
  <h1 id="myH1">Enter your name</h1>

  <!-- 
    Input field:
    This is where the user types their name.
  -->
  <input type="text" id="myText" placeholder="Type your name..." />

  <!-- 
    Button:
    When clicked, it triggers JavaScript code.
  -->
  <button id="mySubmit">Submit</button>

  <!-- 
    JavaScript file is linked at the bottom so HTML loads first.
  -->
  <script src="index.js"></script>
</body>
</html>
